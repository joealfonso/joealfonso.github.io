    <style>
      .not-found {
        min-height: 80vh;
        display: flex;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
      .not-found__inner {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: var(--spacing-xl) 0;
      }
      .not-found__code {
        font-size: clamp(6rem, 20vw, 14rem);
        font-weight: 700;
        line-height: 1;
        color: var(--color-accent);
        opacity: 0.18;
        letter-spacing: -0.04em;
        font-family: var(--font-sans);
        display: block;
        margin-bottom: var(--spacing-lg);
        pointer-events: none;
        user-select: none;
      }
      .not-found__heading {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        font-weight: 600;
        color: var(--color-text);
        margin-bottom: var(--spacing-sm);
      }
      .not-found__body {
        color: var(--color-muted);
        font-size: 1.125rem;
        max-width: 40ch;
        margin: 0 auto var(--spacing-lg);
        line-height: 1.7;
      }
      .not-found__links {
        display: flex;
        flex-wrap: wrap;
        gap: var(--spacing-sm);
        justify-content: center;
      }
      .not-found__link {
        display: inline-block;
        padding: 0.65rem 1.4rem;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        transition: background 0.2s, color 0.2s, opacity 0.2s;
      }
      .not-found__link--primary {
        background: var(--color-accent);
        color: var(--color-bg);
      }
      .not-found__link--primary:hover {
        background: var(--color-accent-hover);
      }
      .not-found__link--secondary {
        color: var(--color-accent);
        border: 1px solid var(--color-accent);
      }
      .not-found__link--secondary:hover {
        opacity: 0.75;
      }
    </style>
  </head>
